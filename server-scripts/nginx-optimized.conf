load_module modules/ngx_rtmp_module.so;

user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance I/O
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    aio on;
    directio 512;
    sendfile_max_chunk 1m;

    # Keepalive
    keepalive_timeout 30;
    keepalive_requests 1000;

    # Buffer sizes
    client_body_buffer_size 16k;
    client_max_body_size 50m;
    output_buffers 2 1m;

    # Cache de arquivos abertos (otimo para HLS - mesmos .ts lidos muitas vezes)
    open_file_cache max=10000 inactive=30s;
    open_file_cache_valid 10s;
    open_file_cache_min_uses 1;
    open_file_cache_errors on;

    # Gzip para playlists m3u8 (texto, comprime bem)
    gzip on;
    gzip_types application/vnd.apple.mpegurl;
    gzip_min_length 256;

    # Logging reduzido (menos I/O)
    access_log off;

    server {
        listen 8080;
        server_name _;

        location / {
            root /var/www/html;
            index index.html;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /socket.io/ {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # HLS - otimizado para streaming
        location /live {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;

            # Cache headers: m3u8 sem cache, .ts com cache curto
            add_header Cache-Control no-cache;

            # Desabilitar buffering para baixa latencia
            proxy_buffering off;
        }

        # Gravacoes
        location /recordings {
            root /var/www/html;
            autoindex on;
            autoindex_format json;
            add_header Cache-Control no-cache;
        }

        # Info de disco
        location = /disk-usage.json {
            root /var/www/html;
            add_header Cache-Control no-cache;
            default_type application/json;
        }
    }
}

rtmp {
    server {
        listen 1935;
        chunk_size 8192;

        application live {
            live on;

            # Gravacao
            record all;
            record_path /var/www/html/recordings;
            record_unique on;
            record_suffix _%Y%m%d_%H%M%S.flv;
            exec_record_done /usr/local/bin/convert-recording.sh $path;

            # HLS otimizado
            hls on;
            hls_path /tmp/live;
            hls_fragment 2s;
            hls_playlist_length 10s;
            hls_continuous on;
            hls_cleanup on;

            # Para restringir quem pode transmitir, descomente e adicione o IP da igreja:
            # allow publish IP_DA_IGREJA;
            # deny publish all;
        }
    }
}
