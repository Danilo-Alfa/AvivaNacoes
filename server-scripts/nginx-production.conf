load_module modules/ngx_rtmp_module.so;

user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log error;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # I/O otimizado para servir arquivos de video
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    sendfile_max_chunk 512k;

    # Keepalive - viewers HLS reutilizam conexoes
    keepalive_timeout 30;
    keepalive_requests 500;

    # Buffers conservadores (1500 Kbps nao precisa de muito)
    client_body_buffer_size 16k;
    client_max_body_size 50m;
    output_buffers 2 512k;

    # Cache de arquivos abertos - os mesmos .ts sao lidos por todos os viewers
    # Com HLS 2s fragment + 10s playlist = ~6 arquivos ativos por stream
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 5s;
    open_file_cache_min_uses 1;
    open_file_cache_errors on;

    # Gzip para playlists m3u8 (texto compressivel)
    gzip on;
    gzip_types application/vnd.apple.mpegurl;
    gzip_min_length 100;

    # Sem access log para HLS (reduz I/O drasticamente)
    access_log off;

    server {
        listen 8080;
        server_name _;

        # Pagina inicial do servidor
        location / {
            root /var/www/html;
            index index.html;
        }

        # HLS - servido da RAM (tmpfs)
        location /live {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /dev/shm;

            # m3u8 nunca cachear, .ts cachear por pouco tempo
            location ~* \.m3u8$ {
                add_header Cache-Control "no-cache, no-store";
                root /dev/shm;
            }
            location ~* \.ts$ {
                add_header Cache-Control "max-age=10";
                root /dev/shm;
            }
        }

        # Gravacoes (arquivos grandes, servir eficientemente)
        location /recordings {
            root /var/www/html;
            autoindex on;
            autoindex_format json;
            add_header Cache-Control no-cache;

            # Suportar Range Requests para streaming progressivo de MP4
            add_header Accept-Ranges bytes;
        }

        # Info de disco
        location = /disk-usage.json {
            root /var/www/html;
            add_header Cache-Control no-cache;
            default_type application/json;
        }
    }
}

rtmp {
    server {
        listen 1935;
        chunk_size 8192;
        buflen 2s;

        application live {
            live on;

            # Gravacao automatica
            record all;
            record_path /var/www/html/recordings;
            record_unique on;
            record_suffix _%Y%m%d_%H%M%S.flv;
            exec_record_done /usr/local/bin/convert-recording.sh $path;

            # HLS na RAM - zero I/O de disco
            hls on;
            hls_path /dev/shm/live;
            hls_fragment 2s;
            hls_playlist_length 10s;
            hls_continuous on;
            hls_cleanup on;

            # Seguranca: descomentar e adicionar IP da igreja para restringir
            # allow publish IP_DA_IGREJA;
            # deny publish all;
        }
    }
}
